<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Personal Hub">
  <meta name="theme-color" content="#3D43A2">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Personal Hub</title>
  <style>
  html,body{margin:0;height:100%;background:#ECEEF7;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#161A3F;-webkit-tap-highlight-color:transparent}
  .card{text-align:center;padding:28px 26px;max-width:330px;width:88%}
  .logo{width:88px;height:88px;border-radius:21px;box-shadow:0 10px 28px rgba(20,22,50,.20)}
  .title{font-family:Georgia,serif;font-weight:700;font-size:25px;margin:16px 0 2px}
  .sub{font-size:13px;color:#6B7088;margin-bottom:22px}
  .btn{display:block;background:#3D43A2;color:#fff;font-weight:700;font-size:16px;text-decoration:none;padding:15px;border-radius:13px}
  .btn:active{background:#23286B}
  .hint{font-size:12.5px;color:#6B7088;margin-top:18px;line-height:1.55}
  .hint b{color:#3D43A2}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="icon-192.png" alt="Personal Hub">
    <div class="title">Personal Hub</div>
    <div class="sub">Seu planner + DID, dados ao vivo</div>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbz6TgZmviSz3JJkx38rN9Jfryw_N98IYS5cMW5R2YaSpkJPJiyW3ak1jAE8mmBOP2ij9w/exec">Abrir o app →</a>
    <div class="hint">📲 Para instalar: toque em <b>Compartilhar</b> e depois em <b>Adicionar à Tela de Início</b>.</div>
  </div>
  <script>
  /* No navegador: NÃO redireciona (dá tempo de "Adicionar à Tela de Início").
     Já instalado (aberto da tela inicial): abre o app direto. */
  (function(){
    var standalone = window.navigator.standalone === true || (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    if (standalone) location.replace("https://script.google.com/macros/s/AKfycbz6TgZmviSz3JJkx38rN9Jfryw_N98IYS5cMW5R2YaSpkJPJiyW3ak1jAE8mmBOP2ij9w/exec");
  })();
  </script>
</body>
</html>

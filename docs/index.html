<style>
:root{
  --space:#0E1130; --ind0:#161A3F; --ind1:#23286B; --ind2:#3D43A2; --ind-soft:#EEF0FA;
  --gold:#E5A93C; --goldL:#F4D38A; --parch:#F4EFE3;
  --bg:#F4F5FB; --surface:#fff; --ink:#1A1C2E; --muted:#6B7088; --line:#E5E7F2;
  --ok:#1F9D57; --okbg:#E7F6EE; --miss:#C8462F; --missbg:#FBEDE9;
  --saude:#1FA37A; --medtech:#2E5E8C; --crypto:#7A4F9E; --agro:#4E944F; --consult:#475569; --mkt:#3D43A2;
  /* chips de frente (projetos) — usados nos pills do DID v3 */
  --hefesto:#2E5E8C; --iamed:#3E8E9C; --qbem:#1FA37A; --ihb:#3D5A80; --deagro:#4E944F;
  /* sub-frentes da aba Saúde (bordas de seção) */
  --suplementar:#1FA37A; --operadoras:#0E7C7B; --prestadores:#2E8BC0; --pharma:#5B6FB5;
  /* sub-frentes da aba Demais Mercados */
  --bigtech:#5A54C9; --tech:#0E9AA7;
  --serif:Georgia,"Times New Roman",serif; --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
  --r:12px; --r-sm:8px; --r-lg:16px; --sh:0 1px 3px rgba(20,22,50,.07); --sh-md:0 8px 24px rgba(20,22,50,.12);
  --sidebar:248px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}

/* ===== SHELL ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);flex:0 0 var(--sidebar);background:#ECEEF7;
  color:#2A2E4A;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:40;border-right:1px solid var(--line)}
.sb-brand{display:flex;align-items:center;gap:11px;padding:18px 18px 16px}
.sb-brand svg{width:38px;height:38px;flex:0 0 38px;filter:drop-shadow(0 2px 6px rgba(20,22,50,.2))}
.sb-brand .wm{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:.04em;color:var(--ind0);line-height:1.1}
.sb-nav{display:flex;flex-direction:column;gap:2px;padding:10px 10px;flex:1}
.sb-link{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;border:none;background:transparent;
  color:#565B82;font-size:14px;font-weight:600;text-align:left;width:100%;transition:.15s}
.sb-link .ico{font-size:17px;width:20px;text-align:center}
.sb-link:hover{background:rgba(61,67,162,.08);color:var(--ind0)}
.sb-link.active{background:#fff;color:var(--ind0);box-shadow:inset 3px 0 0 var(--gold),var(--sh)}
.sb-foot{padding:14px 18px;font-size:11px;color:var(--muted);border-top:1px solid var(--line)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.content{padding:22px 26px 60px;max-width:1640px;width:100%}
.page-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.page-head h1{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--ind0)}
.page-head .sub{color:var(--muted);font-size:13px}
.spacer{flex:1}

/* ===== COMPONENTES ===== */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);
  font-weight:600;font-size:13.5px;padding:9px 14px;border-radius:10px;transition:.15s}
.btn:hover{border-color:var(--ind2);background:#fbfbfe}
.btn-primary{background:var(--ind2);border-color:var(--ind2);color:#fff}
.btn-primary:hover{background:var(--ind1)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#3a2a06}.btn-gold:hover{background:var(--goldL)}
.btn-sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}.btn-ghost:hover{background:#eef0f7}
.icbtn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:14px}
.icbtn:hover{border-color:var(--ind2);color:var(--ind2)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:16px 18px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;line-height:1.7}
.chip .dot{width:7px;height:7px;border-radius:50%}
.muted{color:var(--muted)}
.seg{display:inline-flex;background:#EAECF6;border-radius:10px;padding:3px;gap:2px}
.seg button{border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13px;padding:7px 13px;border-radius:8px}
.seg button.active{background:#fff;color:var(--ind0);box-shadow:var(--sh)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ind2);box-shadow:0 0 0 3px rgba(61,67,162,.13)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ind0);color:#fff;
  padding:10px 16px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.22s;z-index:200;box-shadow:var(--sh-md)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(14,17,48,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:120;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:var(--r-lg);width:min(540px,96vw);max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--sh-md);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;background:linear-gradient(120deg,var(--ind1),var(--ind2));color:#fff}
.modal-head h3{font-size:16px;font-weight:700}
.modal-head .x{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:8px;font-size:16px}
.modal-body{padding:18px;overflow:auto;display:flex;flex-direction:column;gap:13px}
.modal-foot{display:flex;gap:9px;justify-content:space-between;align-items:center;padding:13px 18px;border-top:1px solid var(--line);background:#FAFAFE}

/* ===== AGENDA ===== */
.agenda-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.wknav{display:inline-flex;align-items:center;gap:4px}
.wknav .lbl{font-weight:700;color:var(--ind0);min-width:150px;text-align:center}
.weekgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:12px}
.day{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.day.today{border-color:var(--ind2);box-shadow:0 0 0 2px rgba(61,67,162,.25)}
.day-head{padding:9px 11px;background:#FAFAFE;border-bottom:1px solid var(--line)}
.day-head .dow{font-weight:700;font-size:13px;color:var(--ind0)}
.day-head .dt{font-size:11px;color:var(--muted)}
.day-head .row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.locsel{display:block;width:100%;margin-top:6px;font-size:11px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:#fff;color:var(--ink)}
.day-sum{font-size:10.5px;color:var(--muted);margin-top:3px}
.day-sum b{color:var(--ind2)}
/* clima */
.wxbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:-4px 0 14px;padding:9px 13px;background:linear-gradient(90deg,#F4F6FD,#EEF0FA);border:1px solid var(--line);border-radius:12px}
.wxbar-date{font-weight:700;color:var(--ind0)}
.wxbar-loc{font-size:12px;color:var(--muted);margin-left:auto}
.wx{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#4a5070;white-space:nowrap}
.wx .wx-ic{font-size:13px;line-height:1}
.wx small{font-weight:500;color:var(--muted)}
.wx .wx-pop{margin-left:4px;color:#2563EB;font-weight:600}
.wx.wx-lg{font-size:14px;font-weight:700;color:var(--ink)}
.wx.wx-lg .wx-ic{font-size:18px}
.day-head .row .wx{flex:none}
.mcell-h{display:flex;align-items:center;justify-content:space-between}
.mcell-wx{font-size:12px;line-height:1}
.day-body{padding:8px;display:flex;flex-direction:column;gap:7px;height:62vh;overflow-y:auto}
.day-body::-webkit-scrollbar{width:6px}.day-body::-webkit-scrollbar-thumb{background:#D7DAEA;border-radius:3px}
.ev{position:relative;border:1px solid var(--line);border-left:3px solid var(--ind2);border-radius:9px;background:#fff;padding:7px 9px;flex:0 0 auto}
.ev:hover{box-shadow:var(--sh-md);cursor:pointer}
.ev-actions{position:absolute;top:6px;right:7px;display:flex;align-items:center;gap:3px;z-index:2}
.ev-del{width:15px;height:15px;border:none;background:transparent;color:#B9BCD0;font-size:15px;line-height:1;border-radius:4px;cursor:pointer;padding:0}
.ev-del:hover{background:var(--missbg);color:var(--miss)}
.ev .t{font-size:10px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:36px;margin-bottom:2px}
.ev .ti{font-size:12.5px;font-weight:600;margin:1px 0 4px;line-height:1.3}
.ev .meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;min-width:0}

var DID={};
var CFG=[],EVENTS=[],LOCS={};
var WX={};        /* previsão por dia: { 'AAAA-MM-DD': {tmax,tmin,icon,desc,pop} } */
var WXMETA=null;  /* { local, updatedAt } */
function wxLoad(){ api('getWeather').then(function(w){ WX={}; WXMETA=null; if(w&&w.dias){ (w.dias||[]).forEach(function(d){ if(d&&d.date)WX[d.date]=d; }); WXMETA={local:w.local||'',updatedAt:w.updatedAt||''}; if(page==='agenda')renderAgenda(); } }).catch(function(){}); }
function wxOf(iso){ return WX[iso]||null; }
function wxChip(iso){ var w=wxOf(iso); if(!w)return ''; var t=(w.tmax!=null?Math.round(w.tmax)+'°':''); var lo=(w.tmin!=null?'<small>/'+Math.round(w.tmin)+'°</small>':''); var rain=(w.pop!=null&&w.pop>=30?'<span class="wx-pop">💧'+Math.round(w.pop)+'%</span>':''); return '<span class="wx" title="'+esc(w.desc||'')+(w.pop!=null?(' · chuva '+Math.round(w.pop)+'%'):'')+'"><span class="wx-ic">'+(w.icon||'')+'</span>'+t+lo+rain+'</span>'; }
function wxToday(){ var w=wxOf(isoOf(TODAY)); if(!w)return ''; return '<span class="wx wx-lg" title="'+esc(w.desc||'')+'"><span class="wx-ic">'+(w.icon||'')+'</span> '+(w.tmax!=null?Math.round(w.tmax)+'°':'')+(w.tmin!=null?' / '+Math.round(w.tmin)+'°':'')+(w.desc?' · '+esc(w.desc):'')+'</span>'; }
function dateFull(d){ return DOW[(d.getDay()+6)%7]+', '+d.getDate()+' de '+MONFULL[d.getMonth()].toLowerCase()+' de '+d.getFullYear(); }
function wxBarHTML(){ return '<div class="wxbar"><span class="wxbar-date">'+dateFull(TODAY)+'</span>'+wxToday()+(WXMETA&&WXMETA.local?'<span class="wxbar-loc">'+esc(WXMETA.local)+'</span>':'')+'</div>'; }
function saveCfg(){api('saveAllConfig',CFG).catch(function(){toast('Falha ao salvar config');});}
function saveEv(){api('saveAllEvents',EVENTS).catch(function(){toast('Falha ao salvar');});}
function saveLocs(){var a=Object.keys(LOCS).filter(function(k){return LOCS[k];}).map(function(k){return {date:k,loc:LOCS[k]};});api('saveAllLocations',a).catch(function(){toast('Falha ao salvar local');});}
function getLoc(iso){return LOCS[iso]||'';}
function setLoc(iso,v){if(v)LOCS[iso]=v;else delete LOCS[iso];saveLocs();renderAgenda();}
function locSelect(iso,cur){var ops=byCat('local').map(function(l){return '<option value="'+l.valor+'"'+(l.valor===cur?' selected':'')+'>'+l.valor+'</option>';}).join('');return '<select class="locsel" title="Local de trabalho (gerencie em Sistema)" onclick="event.stopPropagation()" onchange="setLoc(\''+iso+'\',this.value)"><option value="">· local de trabalho</option>'+ops+'</select>';}
function load(){var v=document.getElementById('view');if(v)v.innerHTML='<div style="padding:48px;text-align:center;color:#6B7088">Carregando…</div>';api('getBootstrap').then(function(d){CFG=(d&&d.config)||[];EVENTS=(d&&d.events)||[];LOCS=(d&&d.locations)||{};render();wxLoad();}).catch(function(e){var vv=document.getElementById('view');if(vv)vv.innerHTML='<div class="card">Erro ao carregar: '+((e&&e.message)||e)+'</div>';});}
document.addEventListener('visibilitychange',function(){ if(!document.hidden&&refreshToday()&&page==='agenda')renderAgenda(); });
function reloadAgenda(){toast('Atualizando…');
  api('pullAgenda').then(function(r){if(r&&r.events)EVENTS=r.events;renderAgenda();
    toast((r&&r.applied)?('Agenda atualizada — '+r.applied+' do cron'):'Agenda atualizada');})
  .catch(function(){toast('Falha ao atualizar');});}

/* helpers de config */
function byCat(c){return CFG.filter(function(x){return x.cat===c;}).sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});}
function cfgFind(cat,valor){return CFG.find(function(x){return x.cat===cat&&x.valor===valor;});}
function subtiposOf(tipo){return byCat('subtipo').filter(function(s){return s.pai===tipo;});}
function tipoOf(subtipo){var s=cfgFind('subtipo',subtipo);return s?s.pai:'';}
function colorOf(e){var p=e.projeto&&cfgFind('projeto',e.projeto);if(p)return p.cor;var s=cfgFind('subtipo',e.subtipo);if(s)return s.cor;return '#3D43A2';}
function isWork(e){return tipoOf(e.subtipo)==='Trabalho';}
function cfgById(id){return CFG.find(function(c){return c.id===id;});}
function subRow(tipoVal,subVal){return CFG.find(function(x){return x.cat==='subtipo'&&x.valor===subVal&&x.pai===tipoVal;});}
function subsByPai(pid){return CFG.filter(function(x){return x.cat==='subsub'&&x.pai===pid;}).sort(function(a,b){return (a.ordem||0)-(b.ordem||0);});}
function subsubOf(tipoVal,subVal){var s=subRow(tipoVal,subVal);return s?subsByPai(s.id):[];}

/* tempo */
function toMin(hhmm){var m=/^(\d{1,2}):(\d{2})/.exec(hhmm||'');return m?(+m[1])*60+(+m[2]):0;}
function durH(e){var a=toMin(e.start),b=toMin(e.end);if(b<=a)b+=1440;return (b-a)/60;}
function fmtH(h){return (Math.round(h*100)/100).toString().replace('.',',');}
function pad(n){return ('0'+n).slice(-2);}
function isoOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseISO(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function mondayOf(d){var x=new Date(d);var dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
var DOW=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
var MON=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var MONFULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ============================ SHELL / ROUTER ============================ */
var NAV=[{k:'agenda',ic:'🗓️',t:'Agenda'},{k:'did',ic:'📰',t:'DID'},{k:'ind',ic:'📊',t:'Indicadores'},{k:'sys',ic:'⚙️',t:'Sistema'}];
var page='agenda';
var TODAY=(window.__HUB_TODAY?new Date(window.__HUB_TODAY+'T00:00:00'):new Date()); TODAY.setHours(0,0,0,0); // data real (harness pode fixar via __HUB_TODAY)
/** Recalcula "hoje" (o app pode ficar aberto virando o dia). Retorna true se a data mudou. */
function refreshToday(){ if(window.__HUB_TODAY)return false; var n=new Date(); n.setHours(0,0,0,0); if(isoOf(n)!==isoOf(TODAY)){TODAY=n; return true;} return false; }
var agView='semana';
var cur=new Date(TODAY);
function weekStart(){return mondayOf(cur);}
function $(s){return document.querySelector(s);}
function el(id){return document.getElementById(id);}
function toast(t){var e=el('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},1500);}
function toggleNav(){document.body.classList.toggle('nav-open');}
function closeNav(){document.body.classList.remove('nav-open');}
function buildNav(){el('sbnav').innerHTML=NAV.map(function(n){return '<button class="sb-link'+(n.k===page?' active':'')+'" onclick="go(\''+n.k+'\')"><span class="ico">'+n.ic+'</span>'+n.t+'</button>';}).join('');}
function go(k){page=k;closeNav();buildNav();render();}
function render(){
  refreshToday(); el('todayStr').textContent=pad(TODAY.getDate())+'/'+pad(TODAY.getMonth()+1);
  el('topTitle').textContent=(NAV.find(function(n){return n.k===page;})||{}).t||'Hub';
  if(page==='agenda')renderAgenda();else if(page==='did')renderDID();else if(page==='ind')renderInd();else renderSys();
  window.scrollTo(0,0);
}
el('todayStr').textContent=pad(TODAY.getDate())+'/'+pad(TODAY.getMonth()+1);

/* ============================ AGENDA ============================ */
function weekDays(){var m=weekStart();var a=[];for(var i=0;i<7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(d);}return a;}
function eventsOf(iso){return EVENTS.filter(function(e){return e.date===iso;}).sort(function(a,b){return toMin(a.start)-toMin(b.start);});}
function renderAgenda(){ if(agView==='dia')return renderDay(); if(agView==='mes')return renderMonth(); return renderWeek(); }
function navAg(n){ if(agView==='dia')cur.setDate(cur.getDate()+n); else if(agView==='mes')cur.setMonth(cur.getMonth()+n); else cur.setDate(cur.getDate()+n*7); cur=new Date(cur); renderAgenda(); window.scrollTo(0,0); }
function agHeader(label,sub){
  return '<div class="page-head"><h1>Agenda</h1><div class="seg">'+
    [['mes','Mês'],['semana','Semana'],['dia','Dia']].map(function(v){return '<button class="'+(agView===v[0]?'active':'')+'" onclick="agView=\''+v[0]+'\';renderAgenda();window.scrollTo(0,0)">'+v[1]+'</button>';}).join('')+'</div>'+
    '<div class="spacer"></div><button class="btn btn-sm" onclick="reloadAgenda()">↻ Atualizar</button><button class="btn btn-primary" onclick="openEvent(null)">＋ Evento</button></div>'+
    '<div class="agenda-bar"><div class="wknav"><button class="icbtn" onclick="navAg(-1)">◀</button><span class="lbl">'+label+'</span><button class="icbtn" onclick="navAg(1)">▶</button><button class="btn btn-sm" onclick="goToday()">Hoje</button></div>'+(sub?'<div class="muted" style="font-size:12.5px">'+sub+'</div>':'')+'</div>';
}
function dayHeadHTML(d,iso){return '<div class="day-head"><div class="row"><div><div class="dow">'+DOW[(d.getDay()+6)%7]+'</div><div class="dt">'+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'</div></div>'+wxChip(iso)+'</div>'+locSelect(iso,getLoc(iso))+'</div>';}
function renderWeek(){
  var days=weekDays(), label=pad(days[0].getDate())+'–'+pad(days[6].getDate())+' '+MON[days[6].getMonth()]+' '+days[6].getFullYear();
  var w=0,p=0; EVENTS.forEach(function(e){if(days.some(function(d){return isoOf(d)===e.date;})){if(isWork(e))w+=durH(e);else p+=durH(e);}});
  var h=agHeader(label,'<b>'+fmtH(w)+'h</b> trab · '+fmtH(p)+'h pess')+wxBarHTML();
  h+='<div class="weekgrid">';
  days.forEach(function(d){
    var iso=isoOf(d),evs=eventsOf(iso),today=isoOf(d)===isoOf(TODAY),wH=0;evs.forEach(function(e){if(isWork(e))wH+=durH(e);});
    h+='<div class="day'+(today?' today':'')+'"><div class="day-head"><div class="row"><div><div class="dow">'+DOW[(d.getDay()+6)%7]+'</div><div class="dt">'+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'</div></div>'+wxChip(iso)+'</div>'+locSelect(iso,getLoc(iso))+'<div class="day-sum">'+(wH?('<b>'+fmtH(wH)+'h</b> trabalho'):'&nbsp;')+'</div></div><div class="day-body">';
    if(!evs.length)h+='<div class="empty-day">Sem compromissos</div>';
    evs.forEach(function(e){h+=evCard(e);});
    h+='</div></div>';
  });
  h+='</div>';
  el('view').innerHTML=h;
}
function renderDay(){
  var d=new Date(cur), iso=isoOf(d), evs=eventsOf(iso), w=0,p=0;
  evs.forEach(function(e){if(isWork(e))w+=durH(e);else p+=durH(e);});
  var label=DOW[(d.getDay()+6)%7]+', '+pad(d.getDate())+' '+MON[d.getMonth()]+' '+d.getFullYear();
  var h=agHeader(label,(w?'<b>'+fmtH(w)+'h</b> trab':'')+(p?((w?' · ':'')+fmtH(p)+'h pess'):''))+wxBarHTML();
  h+='<div class="dayview"><div class="day">'+dayHeadHTML(d,iso)+'<div class="dayview-body">';
  if(!evs.length)h+='<div class="empty-day">Sem compromissos</div>';
  evs.forEach(function(e){h+=evCard(e);});
  h+='</div></div></div>';
  el('view').innerHTML=h;
}
function renderMonth(){
  var first=new Date(cur.getFullYear(),cur.getMonth(),1), gridStart=mondayOf(first);
  var monthH=0; EVENTS.forEach(function(e){var dt=parseISO(e.date);if(dt.getMonth()===cur.getMonth()&&dt.getFullYear()===cur.getFullYear()&&isWork(e))monthH+=durH(e);});
  var h=agHeader(MONFULL[cur.getMonth()]+' '+cur.getFullYear(),'<b>'+fmtH(monthH)+'h</b> trabalho no mês')+wxBarHTML();
  h+='<div class="month"><div class="month-dows">'+['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(function(x){return '<div>'+x+'</div>';}).join('')+'</div><div class="month-grid">';
  for(var i=0;i<42;i++){
    var d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    var iso=isoOf(d), evs=eventsOf(iso), inM=d.getMonth()===cur.getMonth(), today=iso===isoOf(TODAY);
    h+='<div class="mcell'+(inM?'':' out')+(today?' today':'')+'" onclick="cur=parseISO(\''+iso+'\');agView=\'dia\';renderAgenda();window.scrollTo(0,0)">'+
      '<div class="mcell-h"><span>'+d.getDate()+'</span>'+(wxOf(iso)?'<span class="mcell-wx" title="'+esc(wxOf(iso).desc||'')+'">'+(wxOf(iso).icon||'')+'</span>':'')+'</div><div class="mcell-evs">'+
      evs.slice(0,4).map(function(e){var c=colorOf(e);return '<div class="mev" style="background:'+hex2bg(c)+';color:'+c+'">'+esc(e.start)+' '+esc(e.titulo)+'</div>';}).join('')+
      (evs.length>4?'<div class="mmore">+'+(evs.length-4)+' mais</div>':'')+'</div></div>';
  }
  h+='</div></div>';
  el('view').innerHTML=h;
}
function evCard(e){
  var col=colorOf(e),st=e.status,cls=st==='done'?'done':(st==='miss'?'miss':'');
  var sym=st==='done'?'✓':(st==='miss'?'✗':'○');
  var sub=cfgFind('subtipo',e.subtipo);
  var chips='';
  if(e.projeto){var p=cfgFind('projeto',e.projeto);chips+='<span class="chip" style="background:'+hex2bg(p?p.cor:col)+';color:'+(p?p.cor:col)+'"><span class="dot" style="background:'+(p?p.cor:col)+'"></span>'+e.projeto+'</span>';}
  if(e.subtipo)chips+='<span class="chip" style="background:#EEF0FA;color:#5a5f86">'+e.subtipo+'</span>';
  if(e.subsub)chips+='<span class="chip" style="background:#F4EFE3;color:#7a5300">'+esc(e.subsub)+'</span>';
  var tlabel=e.start+'–'+e.end;
  return '<div class="ev '+cls+'" style="border-left-color:'+col+'" onclick="openEvent(\''+e.id+'\')">'+
    '<div class="ev-actions"><span class="st '+cls+'" title="feito/não/—" onclick="event.stopPropagation();cycleStatus(\''+e.id+'\')">'+sym+'</span><button class="ev-del" title="Cancelar evento" onclick="event.stopPropagation();delEvent(\''+e.id+'\')">×</button></div>'+
    '<div class="t">'+tlabel+'</div>'+
    '<div class="ti">'+esc(e.titulo)+'</div>'+
    '<div class="meta">'+(e.fonte==='user'?'<span class="ev-man" title="Evento manual — não alterado pelo cron">✎ manual</span>':'')+chips+'</div>'+(e.note?'<div class="note-line">'+noteHTML(e.note)+'</div>':'')+'</div>';
}
function hex2bg(hex){return hex+'1a';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
/** Renderiza a nota: suporta hiperlink com rótulo [texto](url) e também linka URLs nuas. */
function noteHTML(raw){
  raw=String(raw==null?'':raw);
  function anchor(url,label){return '<a class="note-link" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">'+esc(label)+'</a>';}
  var re=/\[([^\]]+)\]\(\s*((?:https?|file|mailto):[^\s)]+)\s*\)|((?:https?|file):\/\/[^\s]+|mailto:[^\s]+)/g;
  var out='',idx=0,m;
  while((m=re.exec(raw))){ out+=esc(raw.slice(idx,m.index)); if(m[1]){out+=anchor(m[2],m[1]);} else {out+=anchor(m[3],m[3]);} idx=re.lastIndex; }
  out+=esc(raw.slice(idx));
  return out;
}
function goToday(){cur=new Date(TODAY);renderAgenda();window.scrollTo(0,0);}
function cycleStatus(id){var e=EVENTS.find(function(x){return x.id===id;});if(!e)return;e.status=e.status===''?'done':(e.status==='done'?'miss':'');saveEv();renderAgenda();}


/* ============================ MODAL EVENTO ============================ */
function openModal(html){el('modal').innerHTML=html;el('overlay').classList.remove('hidden');}
function closeModal(){el('overlay').classList.add('hidden');}
el('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function openEvent(id){
  var e=id?EVENTS.find(function(x){return x.id===id;}):null;
  var isNew=!e;
  if(isNew){e={id:'',date:isoOf(cur),start:'09:00',end:'10:00',titulo:'',subtipo:'Reunião',subsub:'',projeto:'',local:'',note:''};}
  var tipo=tipoOf(e.subtipo)||'Trabalho';
  var dayOpts=weekDays().map(function(d){var iso=isoOf(d);return '<option value="'+iso+'"'+(iso===e.date?' selected':'')+'>'+DOW[(d.getDay()+6)%7]+' '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'</option>';}).join('');
  var tipoOpts=byCat('tipo').map(function(t){return '<option value="'+t.valor+'"'+(t.valor===tipo?' selected':'')+'>'+t.valor+'</option>';}).join('');
  var projOpts='<option value="">—</option>'+byCat('projeto').map(function(p){return '<option value="'+p.valor+'"'+(p.valor===e.projeto?' selected':'')+'>'+p.valor+'</option>';}).join('');
  var locOpts='<option value="">—</option>'+byCat('local').map(function(l){return '<option value="'+l.valor+'"'+(l.valor===e.local?' selected':'')+'>'+l.valor+'</option>';}).join('');
  openModal('<div class="modal-head"><h3>'+(isNew?'Novo evento':'Editar evento')+'</h3><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
    '<div class="field"><label>Título</label><input id="m_ti" value="'+esc(e.titulo)+'" placeholder="Ex.: Reunião QBem"></div>'+
    '<div class="grid2"><div class="field"><label>Dia</label><select id="m_date">'+dayOpts+'</select></div>'+
      '<div class="field"><label>Local</label><select id="m_loc">'+locOpts+'</select></div></div>'+
    '<div class="grid2"><div class="field"><label>Início</label><input id="m_start" type="time" step="900" value="'+e.start+'"></div>'+
      '<div class="field"><label>Fim</label><input id="m_end" type="time" step="900" value="'+e.end+'"></div></div>'+
    '<div class="grid2"><div class="field"><label>Tipo</label><select id="m_tipo" onchange="fillSub()">'+tipoOpts+'</select></div>'+
      '<div class="field"><label>Subtipo</label><select id="m_sub" onchange="fillSubsub()"></select></div></div>'+
    '<div class="field" id="m_subsub_wrap" style="display:none"><label id="m_subsub_lbl">Detalhe</label><select id="m_subsub"></select></div>'+
    '<div class="field"><label>Projeto / Empresa</label><select id="m_proj">'+projOpts+'</select></div>'+
    '<div class="field"><label>Nota (opcional)</label><textarea id="m_note" rows="2" placeholder="Observação — link: [texto curto](https://… ou file:///…)">'+esc(e.note)+'</textarea><div class="hint">Dica: <code>[Minutas NSP](https://…)</code> mostra só o texto e abre o link.</div></div>'+
    '<div class="muted" id="m_calc" style="font-size:12px"></div>'+
    '</div>'+
    '<div class="modal-foot"><div>'+(isNew?'':'<button class="btn btn-sm btn-ghost" style="color:var(--miss)" onclick="delEvent(\''+e.id+'\')">Excluir</button>')+'</div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-sm btn-primary" onclick="saveEvent(\''+(e.id||'')+'\')">Salvar</button></div></div>');
  fillSub(e.subtipo); fillSubsub(e.subsub);
  ['m_start','m_end','m_tipo'].forEach(function(idd){el(idd).addEventListener('change',calcDur);});calcDur();
}
function fillSub(sel){var tipo=el('m_tipo').value;var subs=subtiposOf(tipo);el('m_sub').innerHTML=subs.map(function(s){return '<option value="'+s.valor+'"'+(s.valor===sel?' selected':'')+'>'+s.valor+'</option>';}).join('');}
function fillSubsub(sel){var tipo=el('m_tipo').value,sub=el('m_sub').value;var nn=subsubOf(tipo,sub);var w=el('m_subsub_wrap');
  if(!nn.length){w.style.display='none';el('m_subsub').innerHTML='';return;}
  w.style.display='';el('m_subsub_lbl').textContent=(sub==='Leitura'?'O que está lendo / estudando':'Detalhe ('+sub+')');
  el('m_subsub').innerHTML='<option value="">—</option>'+nn.map(function(x){return '<option value="'+x.valor+'"'+(x.valor===sel?' selected':'')+'>'+x.valor+'</option>';}).join('');}
function calcDur(){var a=toMin(el('m_start').value),b=toMin(el('m_end').value);if(b<=a)b+=1440;var h=(b-a)/60;var work=el('m_tipo').value==='Trabalho';el('m_calc').innerHTML='Duração: <b>'+fmtH(h)+'h</b>'+(work?' · conta como trabalho':' · pessoal');}
function saveEvent(id){
  var ss=(el('m_subsub_wrap').style.display==='none')?'':el('m_subsub').value;
  var o={titulo:el('m_ti').value.trim(),date:el('m_date').value,start:el('m_start').value,end:el('m_end').value,subtipo:el('m_sub').value,subsub:ss,projeto:el('m_proj').value,local:el('m_loc').value,note:el('m_note').value.trim()};
  if(!o.titulo){toast('Dê um título');return;}
  if(id){var e=EVENTS.find(function(x){return x.id===id;});Object.assign(e,o);e.fonte='user';}else{o.id='evt-'+Date.now();o.status='';o.fonte='user';EVENTS.push(o);}
  saveEv();closeModal();toast('Salvo');renderAgenda();
}
function delEvent(id){var e=EVENTS.find(function(x){return x.id===id;});if(!e)return;if(!confirm('Cancelar o evento "'+(e.titulo||'')+'"?'))return;EVENTS=EVENTS.filter(function(x){return x.id!==id;});saveEv();closeModal();toast('Evento cancelado');renderAgenda();}

/* ============================ INDICADORES ============================ */
var indPeriod='semana';
var indRef=new Date(TODAY);
function indMonday(){return mondayOf(indRef);}
function inRange(iso){var d=parseISO(iso);
  if(indPeriod==='alltime')return true;
  if(indPeriod==='dia')return iso===isoOf(indRef);
  if(indPeriod==='semana'){var m=indMonday(),e=new Date(m);e.setDate(m.getDate()+6);return d>=m&&d<=e;}
  if(indPeriod==='mes')return d.getFullYear()===indRef.getFullYear()&&d.getMonth()===indRef.getMonth();
  if(indPeriod==='ano')return d.getFullYear()===indRef.getFullYear();
  return true;}
function indLabel(){
  if(indPeriod==='alltime')return 'Tudo';
  if(indPeriod==='dia')return DOW[(indRef.getDay()+6)%7]+', '+pad(indRef.getDate())+'/'+pad(indRef.getMonth()+1)+'/'+indRef.getFullYear();
  if(indPeriod==='semana'){var m=indMonday(),e=new Date(m);e.setDate(m.getDate()+6);return pad(m.getDate())+'–'+pad(e.getDate())+' '+MON[e.getMonth()]+' '+e.getFullYear();}
  if(indPeriod==='mes')return MONFULL[indRef.getMonth()]+' '+indRef.getFullYear();
  if(indPeriod==='ano')return ''+indRef.getFullYear();
  return '';}
function indNav(n){
  if(indPeriod==='dia')indRef.setDate(indRef.getDate()+n);
  else if(indPeriod==='semana')indRef.setDate(indRef.getDate()+n*7);
  else if(indPeriod==='mes')indRef.setMonth(indRef.getMonth()+n);
  else if(indPeriod==='ano')indRef.setFullYear(indRef.getFullYear()+n);
  indRef=new Date(indRef);renderInd();}
function indToday(){indRef=new Date(TODAY);renderInd();}
function renderInd(){
  var evs=EVENTS.filter(function(e){return inRange(e.date);});
  var workH=0,persH=0,done=0,plan=0,byProj={},bySub={},byObj={};
  evs.forEach(function(e){var h=durH(e);if(isWork(e))workH+=h;else persH+=h;plan++;if(e.status==='done')done++;
    if(e.projeto)byProj[e.projeto]=(byProj[e.projeto]||0)+h;
    bySub[e.subtipo]=(bySub[e.subtipo]||0)+h;
    if(e.subsub)byObj[e.subsub]=(byObj[e.subsub]||0)+h;});
  var ader=plan?Math.round(done/plan*100):0;
  var h='<div class="page-head"><h1>Indicadores</h1><div class="spacer"></div><div class="seg">'+
    [['dia','Dia'],['semana','Semana'],['mes','Mês'],['ano','Ano'],['alltime','Tudo']].map(function(p){return '<button class="'+(indPeriod===p[0]?'active':'')+'" onclick="indPeriod=\''+p[0]+'\';renderInd()">'+p[1]+'</button>';}).join('')+'</div></div>';
  h+='<div class="agenda-bar">'+(indPeriod==='alltime'?'<div class="wknav"><span class="lbl">Tudo</span></div>':'<div class="wknav"><button class="icbtn" onclick="indNav(-1)">◀</button><span class="lbl">'+indLabel()+'</span><button class="icbtn" onclick="indNav(1)">▶</button><button class="btn btn-sm" onclick="indToday()">Hoje</button></div>')+'</div>';
  h+='<div class="kpis"><div class="kpi"><div class="n">'+fmtH(workH)+'h</div><div class="l">Horas de trabalho</div></div>'+
    '<div class="kpi gold"><div class="n">'+fmtH(persH)+'h</div><div class="l">Horas pessoais</div></div>'+
    '<div class="kpi ok"><div class="n">'+ader+'%</div><div class="l">Aderência</div></div>'+
    '<div class="kpi"><div class="n">'+plan+'</div><div class="l">Eventos</div></div></div>';
  h+='<div class="indcols"><div class="card"><div class="grp-h">Horas por projeto</div>'+bars(byProj,'projeto')+'</div>'+
    '<div class="card"><div class="grp-h">Horas por subtipo</div>'+bars(bySub,'subtipo')+'</div></div>';
  if(Object.keys(byObj).length)h+='<div class="card" style="margin-top:14px"><div class="grp-h">Leitura / estudo — por objeto</div>'+bars(byObj,'subsub')+'</div>';
  el('view').innerHTML=h;
}
function bars(map,cat){var keys=Object.keys(map);if(!keys.length)return '<div class="muted" style="font-size:12px">Sem dados no período.</div>';
  var max=Math.max.apply(null,keys.map(function(k){return map[k];}));
  keys.sort(function(a,b){return map[b]-map[a];});
  return '<div class="bars">'+keys.map(function(k){var c=cfgFind(cat,k);var col=c?c.cor:'#3D43A2';var pct=Math.round(map[k]/max*100);
    return '<div class="bar"><div class="top"><span>'+esc(k)+'</span><span class="muted">'+fmtH(map[k])+'h</span></div><div class="track"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';}).join('')+'</div>';
}

/* ============================ SISTEMA ============================ */
var sysTab='cat';
function exportAgenda(){toast('Exportando…');api('exportState').then(function(r){toast(r||'Exportado');}).catch(function(){toast('Falha ao exportar');});}
function renderSys(){
  var h='<div class="page-head"><h1>Gestão do Sistema</h1><div class="sub">Tabelas de apoio editáveis</div><div class="spacer"></div><button class="btn btn-sm" onclick="exportAgenda()" title="Grava state/current.json no Drive para o cron ler">⬇ Exportar agenda</button></div>';
  h+='<div class="sys-tabs">'+[['cat','Tipos & Subtipos'],['projeto','Projetos / Empresas'],['local','Locais de trabalho']].map(function(t){return '<button class="sys-tab'+(sysTab===t[0]?' active':'')+'" onclick="sysTab=\''+t[0]+'\';renderSys()">'+t[1]+'</button>';}).join('')+'</div>';
  if(sysTab==='cat')h+=sysCats();else h+=sysSimple(sysTab);
  el('view').innerHTML=h;
}
function sysCats(){
  var h='<div class="muted" style="font-size:12px;margin-bottom:8px">Tipo → Subtipo → Neto (ex.: Pessoal → Leitura → Livro/HBR/DID). O neto é opcional no evento.</div>';
  byCat('tipo').forEach(function(t){
    h+='<div class="grp-h" style="display:flex;align-items:center;gap:8px"><span class="swatch" style="background:'+t.cor+'"></span>'+t.valor+' <span class="pill-gov">'+t.gov+'</span><span style="flex:1"></span><button class="btn btn-sm" onclick="openCfg(\'subtipo\',\''+t.valor+'\')">＋ Subtipo</button></div>';
    var subs=subtiposOf(t.valor);
    if(!subs.length)h+='<div class="muted" style="font-style:italic;padding:2px 0 8px">Nenhum subtipo</div>';
    subs.forEach(function(s){
      h+='<div class="sub-block"><div class="sub-row"><span class="swatch" style="background:'+s.cor+'"></span><b>'+esc(s.valor)+'</b><span class="muted" style="font-size:11px">ordem '+(s.ordem||'')+'</span><span style="flex:1"></span>'+
        '<button class="btn btn-sm" onclick="openCfg(\'subsub\',\''+s.id+'\')">＋ neto</button>'+
        '<button class="icbtn" title="editar" onclick="openCfg(\'subtipo\',\''+t.valor+'\',\''+s.id+'\')">✎</button>'+
        '<button class="icbtn" title="excluir" onclick="delCfg(\''+s.id+'\')">×</button></div>';
      var nn=subsByPai(s.id);
      if(nn.length)h+='<div class="neto-list">'+nn.map(function(x){return '<div class="neto-row"><span class="swatch" style="background:'+x.cor+'"></span>'+esc(x.valor)+'<span style="flex:1"></span><button class="icbtn" onclick="openCfg(\'subsub\',\''+s.id+'\',\''+x.id+'\')">✎</button><button class="icbtn" onclick="delCfg(\''+x.id+'\')">×</button></div>';}).join('')+'</div>';
      h+='</div>';
    });
  });
  return h;
}
function sysSimple(cat){
  var label=cat==='projeto'?'Projeto / Empresa':'Local';
  var h='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-sm btn-primary" onclick="openCfg(\''+cat+'\',\'\')">＋ '+label+'</button></div>';
  h+='<table class="tbl"><thead><tr><th style="width:36px"></th><th>'+label+'</th><th style="width:90px">Ordem</th><th style="width:80px">Ações</th></tr></thead><tbody>';
  byCat(cat).forEach(function(c){h+='<tr><td><span class="swatch" style="background:'+c.cor+'"></span></td><td>'+c.valor+'</td><td class="muted">'+(c.ordem||'')+'</td><td><button class="icbtn" onclick="openCfg(\''+cat+'\',\'\',\''+c.id+'\')">✎</button> <button class="icbtn" onclick="delCfg(\''+c.id+'\')">×</button></td></tr>';});
  h+='</tbody></table>';
  return h;
}
function openCfg(cat,pai,id){
  var sib=CFG.filter(function(x){return x.cat===cat&&x.pai===(pai||'');}).length+1;
  var c=id?cfgById(id):{cat:cat,valor:'',cor:'#3D43A2',ordem:sib,pai:pai||'',gov:'usuario'};
  var label=cat==='subtipo'?'Subtipo':(cat==='subsub'?'Neto':(cat==='projeto'?'Projeto / Empresa':'Local'));
  var paiv=c.pai||pai, paiName=(cat==='subsub')?((cfgById(paiv)||{}).valor||paiv):paiv;
  openModal('<div class="modal-head"><h3>'+(id?'Editar ':'Novo ')+label+'</h3><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="modal-body">'+
    ((cat==='subtipo'||cat==='subsub')?'<div class="muted" style="font-size:12px">Pai: <b>'+esc(paiName)+'</b></div>':'')+
    '<div class="field"><label>Nome</label><input id="c_val" value="'+esc(c.valor)+'"></div>'+
    '<div class="grid2"><div class="field"><label>Cor</label><input id="c_cor" type="color" value="'+c.cor+'" style="height:40px;padding:3px"></div>'+
    '<div class="field"><label>Ordem</label><input id="c_ord" type="number" value="'+(c.ordem||1)+'"></div></div>'+
    '</div><div class="modal-foot"><div></div><div style="display:flex;gap:8px"><button class="btn btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-sm btn-primary" onclick="saveCfgItem(\''+(id||'')+'\',\''+cat+'\',\''+(paiv||'')+'\')">Salvar</button></div></div>');
}
function saveCfgItem(id,cat,pai){
  var v=el('c_val').value.trim();if(!v){toast('Dê um nome');return;}
  var o={valor:v,cor:el('c_cor').value,ordem:+el('c_ord').value||1};
  if(id){Object.assign(CFG.find(function(x){return x.id===id;}),o);}else{o.id='cfg-'+Date.now();o.cat=cat;o.pai=pai||'';o.gov='usuario';CFG.push(o);}
  saveCfg();closeModal();toast('Salvo');renderSys();
}
function delCfg(id){var c=cfgById(id);if(c&&c.gov==='sistema'){toast('Item do sistema');return;}CFG=CFG.filter(function(x){return x.id!==id&&x.pai!==id;});saveCfg();toast('Removido');renderSys();}

/* ============================ DID ============================ */
var didLoaded=false, didList=[], didCur='', didTab=(function(){try{return localStorage.getItem('hub_did_tab')||'saude';}catch(e){return 'saude';}})();
function didSetTab(id){didTab=id;try{localStorage.setItem('hub_did_tab',id);}catch(e){}renderDID();}
function didFontesHTML(o){var fontes=(o.fontes&&o.fontes.length)?o.fontes:(o.fonte?[{nome:o.fonte,url:o.url||'#'}]:[]);return fontes.length?'<div class="src">Fonte: '+fontes.map(function(f){return '<a href="'+(f.url||'#')+'" target="_blank" rel="noopener">'+esc(f.nome)+'</a>';}).join(' · ')+'</div>':'';}
function didLeadHTML(lead){return (lead&&lead.length)?'<div class="lead"><h2>O que importa hoje para suas frentes</h2><ul>'+lead.map(function(x){return '<li>'+x+'</li>';}).join('')+'</ul></div>':'';}
function didSecHTML(secoes){return '<div class="didgrid">'+(secoes||[]).map(function(s){return '<div class="card sec '+(s.id||'')+'"><h3>'+s.nome+'</h3><div class="feeds">'+(s.feeds||'')+'</div>'+((s.tickers&&s.tickers.length)?didTickerHTML(s.tickers,'tk-mini',''):'')+(s.itens||[]).map(function(it){return '<div class="item"><h4>'+esc(it.titulo)+'</h4><p>'+esc(it.resumo||'')+'</p>'+(it.porque?'<div class="why"><b>Por que importa:</b> '+esc(it.porque)+'</div>':'')+didFontesHTML(it)+'</div>';}).join('')+'</div>';}).join('')+'</div>';}
function didLeituraHTML(L){if(!L)return '';return '<div class="leitura"><div class="leitura-tag">'+esc(L.rotulo||'📚 Leitura do dia')+(L.assunto?' · <span>'+esc(L.assunto)+'</span>':'')+'</div><h4>'+esc(L.titulo||'')+'</h4><p>'+esc(L.resumo||'')+'</p>'+(L.porque?'<div class="why"><b>Por que importa:</b> '+esc(L.porque)+'</div>':'')+didFontesHTML(L)+'</div>';}
function didTickerHTML(arr,cls,lab){if(!arr||!arr.length)return '';return '<div class="ticker'+(cls?' '+cls:'')+'">'+(lab?'<div class="tk tk-lab">'+esc(lab)+'</div>':'')+arr.map(function(t){return '<div class="tk"><span class="s">'+esc(t.s)+'</span><span class="v">'+esc(t.v)+(t.d?' <span class="'+t.d+'">'+(t.d==='up'?'▲':'▼')+'</span>':'')+'</span></div>';}).join('')+'</div>';}
function renderDID(){
  if(!didLoaded){didLoaded=true;
    api('listDIDs').then(function(l){didList=l||[];if(didList.length)renderDID();}).catch(function(){});
    api('getDID').then(function(x){if(x){DID=x;if(didList[0])didCur=didList[0].name;renderDID();}}).catch(function(){});}
  var d=DID, dl=d.dataLabel||d.data||'';
  var sel=didList.length?'<select class="locsel" style="max-width:170px" onchange="loadDIDByName(this.value)"><option value="">— edição —</option>'+didList.map(function(x){return '<option value="'+x.name+'"'+(x.name===didCur?' selected':'')+'>'+x.date+'</option>';}).join('')+'</select>':'';
  var h='<div class="did-bar">'+sel+'<button class="btn btn-sm" onclick="reloadDID()">↻ Atualizar DID</button></div>';
  h+='<div class="did-mast"><div class="big">DID</div><div class="tl">'+(d.subtitulo||'Jornal pessoal de inteligência de mercado')+'</div>'+
    '<div class="meta"><span><b>'+(d.titulo||'')+'</b></span>'+(dl?'<span>'+esc(dl)+'</span>':'')+(d.local?'<span>'+esc(d.local)+'</span>':'')+'</div></div>';
  if(d.abas&&d.abas.length){
    if(!d.abas.some(function(a){return a.id===didTab;}))didTab=d.abas[0].id;
    h+='<div class="did-tabs">'+d.abas.map(function(a){return '<button class="'+(a.id===didTab?'active':'')+'" onclick="didSetTab(\''+a.id+'\')">'+esc(a.nome)+'</button>';}).join('')+'</div>';
    var aba=d.abas.filter(function(a){return a.id===didTab;})[0]||d.abas[0];
    h+=didTickerHTML(aba.id==='saude'?d.ticker_saude:d.ticker,'','');   // sleeve por aba: Saúde→ticker_saude, Mercados→ticker geral
    h+=didLeadHTML(aba.lead)+didLeituraHTML(aba.leitura)+didSecHTML(aba.secoes);
  }else{
    h+=didTickerHTML(d.ticker,'','');
    h+=didLeadHTML(d.lead)+didSecHTML(d.secoes);
  }
  if(d.note)h+='<div class="did-note">⚙️ '+esc(d.note).replace(/^⚙️\s*/,'')+'</div>';
  el('view').innerHTML=h;
}
function reloadDID(){toast('Atualizando DID…');
  api('listDIDs').then(function(l){didList=l||[];}).catch(function(){});
  api('getDID').then(function(x){if(x){DID=x;if(didList[0])didCur=didList[0].name;renderDID();toast('DID atualizado');}else{toast('Nenhum DID novo no Drive');}})
  .catch(function(){toast('Falha ao atualizar DID');});}
function loadDIDByName(name){if(!name)return;toast('Carregando edição…');didCur=name;
  api('getDIDByName',name).then(function(x){if(x){DID=x;renderDID();toast('Edição carregada');}else toast('Edição não encontrada');})
  .catch(function(){toast('Falha ao carregar');});}

/* boot */
buildNav();load();

</script>
